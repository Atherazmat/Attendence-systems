<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance Systems</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8B%3C/text%3E%3C/svg%3E" />
<style>
  /* ============================= THEME VARIABLES ============================= */
  :root{
    --bg-grad: linear-gradient(160deg,#eef2ff 0%,#f7f9fc 45%,#f3f6ff 100%);
    --surface: rgba(255,255,255,0.68);
    --surface-solid: #ffffff;
    --border: rgba(15,23,42,0.08);
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --shadow: 0 10px 34px rgba(15,23,42,0.09);
    --shadow-sm: 0 4px 14px rgba(15,23,42,0.07);
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;

    --success:#10b981; --success-bg: rgba(16,185,129,.15);
    --warning:#f59e0b; --warning-bg: rgba(245,158,11,.16);
    --danger:#ef4444;  --danger-bg: rgba(239,68,68,.14);
    --muted:#64748b;   --muted-bg: rgba(100,116,139,.14);
    --total:#6366f1;   --total-bg: rgba(99,102,241,.14);
  }
  html.dark{
    --bg-grad: linear-gradient(160deg,#0b1120 0%,#0f172a 50%,#111827 100%);
    --surface: rgba(30,41,59,0.55);
    --surface-solid: #1e293b;
    --border: rgba(255,255,255,0.08);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --shadow: 0 10px 34px rgba(0,0,0,0.45);
    --shadow-sm: 0 4px 14px rgba(0,0,0,0.35);
  }

  /* ============================= RESET / BASE ============================= */
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-grad);
    color:var(--text-primary);
    min-height:100vh;
    transition:background .5s ease, color .3s ease;
    overflow-x:hidden;
  }
  h1,h2,h3,p{ margin:0; }
  button{ font-family:inherit; cursor:pointer; }
  input,select,button{ font-size:.95rem; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(100,116,139,.35); border-radius:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  /* decorative floating blobs */
  .bg-blob{ position:fixed; border-radius:50%; filter:blur(80px); z-index:-1; opacity:.35; animation: float 16s ease-in-out infinite; }
  .bg-blob.one{ width:380px; height:380px; background:var(--accent); top:-120px; left:-100px; }
  .bg-blob.two{ width:420px; height:420px; background:var(--accent-2); bottom:-140px; right:-120px; animation-delay:3s; }
  @keyframes float{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(30px,-25px); } }

  /* ============================= LOADING OVERLAY ============================= */
  #loadingOverlay{
    position:fixed; inset:0; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; background:var(--bg-grad); transition:opacity .5s ease, visibility .5s ease;
  }
  #loadingOverlay.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .spinner{ width:46px; height:46px; border-radius:50%; border:4px solid rgba(99,102,241,.18); border-top-color:var(--accent); animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-text{ font-weight:600; color:var(--text-secondary); letter-spacing:.02em; }

  /* ============================= LAYOUT ============================= */
  .app-shell{ max-width:1180px; margin:0 auto; padding:22px 20px 60px; }

  header.app-header{
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    padding:18px 22px; margin-bottom:20px; border-radius:var(--radius-lg);
    background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-sm); backdrop-filter:blur(18px);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-emoji{ font-size:1.8rem; }
  .brand h1{ font-size:1.3rem; font-weight:800; background:linear-gradient(120deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand p{ font-size:.78rem; color:var(--text-secondary); margin-top:2px; }
  .header-right{ display:flex; align-items:center; gap:14px; }
  #headerClock{ font-size:.85rem; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  #darkModeToggle{
    width:42px; height:42px; border-radius:50%; border:1px solid var(--border); background:var(--surface-solid);
    display:flex; align-items:center; justify-content:center; font-size:1.1rem; transition:transform .25s ease, box-shadow .25s ease;
    box-shadow:var(--shadow-sm);
  }
  #darkModeToggle:hover{ transform:scale(1.08) rotate(10deg); }

  nav.tabs{ display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
  .tab-btn{
    padding:10px 20px; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary);
    border-radius:999px; font-weight:600; font-size:.88rem; transition:all .25s ease; backdrop-filter:blur(10px);
  }
  .tab-btn:hover{ color:var(--text-primary); transform:translateY(-1px); }
  .tab-btn.active{ background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#fff; border-color:transparent; box-shadow:0 8px 20px rgba(99,102,241,.35); }

  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; animation:fadeIn .4s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

  .glass-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-sm); backdrop-filter:blur(18px); padding:20px;
  }

  /* ============================= BUTTONS / FORMS ============================= */
  .btn{ border:none; border-radius:var(--radius-sm); padding:11px 18px; font-weight:600; font-size:.88rem; transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 8px 18px rgba(99,102,241,.32); }
  .btn-primary:hover{ box-shadow:0 10px 24px rgba(99,102,241,.42); transform:translateY(-1px); }
  .btn-secondary{ background:var(--text-primary); color:var(--surface-solid); opacity:.88; }
  .btn-secondary:hover{ opacity:1; }
  .btn-outline{ background:transparent; border:1px solid var(--border); color:var(--text-primary); }
  .btn-outline:hover{ background:rgba(99,102,241,.08); }
  .btn-outline-danger{ background:transparent; border:1px solid rgba(239,68,68,.4); color:var(--danger); }
  .btn-outline-danger:hover{ background:var(--danger-bg); }

  input[type="text"], input[type="date"], select{
    background:var(--surface-solid); border:1px solid var(--border); color:var(--text-primary);
    padding:11px 14px; border-radius:var(--radius-sm); outline:none; transition:border-color .2s ease, box-shadow .2s ease;
  }
  input[type="text"]:focus, input[type="date"]:focus, select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.18); }
  select:disabled{ opacity:.55; cursor:not-allowed; }

  .field-group{ display:flex; flex-direction:column; gap:6px; }
  .field-group label{ font-size:.78rem; font-weight:600; color:var(--text-secondary); }
  .inline-form{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

  .icon-btn{ background:transparent; border:none; font-size:1.05rem; padding:6px 8px; border-radius:8px; color:var(--text-secondary); transition:background .2s ease, color .2s ease; }
  .icon-btn.danger:hover{ background:var(--danger-bg); color:var(--danger); }

  /* ============================= MARK ATTENDANCE TAB ============================= */
  .mark-controls{ display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
  .mark-form{ display:flex; gap:10px; flex-wrap:wrap; }
  .mark-form input{ flex:1; min-width:200px; font-size:1.05rem; letter-spacing:.02em; }
  .status-preview{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .preview-time{ font-size:.8rem; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .mark-controls-footer{ display:flex; justify-content:flex-end; }

  .student-info-card{
    display:none; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
    padding:14px 16px; border-radius:var(--radius-md); background:rgba(99,102,241,.08);
    border:1px solid rgba(99,102,241,.25); animation:fadeIn .3s ease;
  }
  .student-info-main{ display:flex; flex-direction:column; gap:2px; }
  .student-info-name{ font-weight:700; font-size:.98rem; }
  .student-info-meta{ font-size:.8rem; color:var(--text-secondary); }

  .mark-lists{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  @media (max-width:920px){ .mark-lists{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:560px){ .mark-lists{ grid-template-columns:1fr; } }

  .status-col{ padding:16px; display:flex; flex-direction:column; gap:10px; max-height:420px; }
  .status-col-header{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:.92rem; }
  .status-count{ margin-left:auto; background:rgba(0,0,0,.06); padding:2px 10px; border-radius:999px; font-size:.8rem; }
  html.dark .status-count{ background:rgba(255,255,255,.08); }
  .student-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px; overflow-y:auto; }
  .student-row{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; background:rgba(0,0,0,.025); font-size:.85rem; }
  html.dark .student-row{ background:rgba(255,255,255,.04); }
  .student-roll{ font-weight:700; font-variant-numeric:tabular-nums; opacity:.75; min-width:34px; }
  .student-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .student-time{ font-size:.72rem; color:var(--text-secondary); white-space:nowrap; }
  .student-time em{ font-style:normal; opacity:.7; }
  .empty-row, .empty-state{ color:var(--text-secondary); font-size:.85rem; padding:14px 4px; text-align:center; }

  /* ============================= CLASSES TAB ============================= */
  #classesTabContent > .inline-form{ margin-bottom:20px; }
  #newClassName{ flex:1; min-width:220px; }
  .class-card{ margin-bottom:14px; padding:0; overflow:hidden; }
  .class-card-header{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; }
  .class-card-title{ display:flex; align-items:center; gap:10px; font-weight:700; }
  .chevron{ display:inline-block; transition:transform .25s ease; color:var(--text-secondary); }
  .chevron.open{ transform:rotate(90deg); }
  .class-count{ font-size:.76rem; font-weight:600; color:var(--text-secondary); background:rgba(99,102,241,.12); padding:2px 10px; border-radius:999px; }
  .class-card-body{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .32s ease; border-top:1px solid transparent; }
  .class-card-body.open{ grid-template-rows:1fr; border-top:1px solid var(--border); }
  .ccb-inner{ overflow:hidden; min-height:0; padding:0 18px; }
  .class-card-body.open .ccb-inner{ padding:16px 18px 18px; }
  .add-student-form input{ flex:1; min-width:140px; }
  .class-card .student-list{ margin-top:14px; max-height:260px; }
  .class-card .student-row{ justify-content:space-between; }

  .danger-zone{ margin-top:26px; padding:18px; border:1px dashed rgba(239,68,68,.4); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .danger-zone p{ font-size:.82rem; color:var(--text-secondary); max-width:420px; }

  /* ============================= RECORDS TAB ============================= */
  .records-controls{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .records-controls select{ min-width:180px; }
  #recordsSearchInput{ flex:1; min-width:180px; }
  .records-summary{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .summary-pill{ padding:7px 14px; border-radius:999px; font-size:.8rem; font-weight:700; }
  .table-wrap{ overflow-x:auto; padding:0; }
  table{ width:100%; border-collapse:collapse; min-width:560px; }
  thead th{ text-align:left; font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; color:var(--text-secondary); padding:14px 18px; border-bottom:1px solid var(--border); }
  tbody td{ padding:12px 18px; border-bottom:1px solid var(--border); font-size:.88rem; vertical-align:middle; }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:rgba(99,102,241,.05); }
  .status-select{ padding:7px 10px; font-size:.8rem; }
  .tag-manual{ font-size:.66rem; color:var(--text-secondary); margin-left:6px; opacity:.8; }

  /* ============================= SHARED BADGES / PILLS ============================= */
  .badge, .pill{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:999px; font-size:.78rem; font-weight:700; }
  .success{ color:var(--success); background:var(--success-bg); }
  .warning{ color:var(--warning); background:var(--warning-bg); }
  .danger{  color:var(--danger);  background:var(--danger-bg); }
  .muted{   color:var(--muted);   background:var(--muted-bg); }
  .total{   color:var(--total);   background:var(--total-bg); }

  /* ============================= TOASTS ============================= */
  #toastContainer{ position:fixed; bottom:22px; right:22px; z-index:10000; display:flex; flex-direction:column; gap:10px; pointer-events:none; max-width:340px; }
  .toast{
    pointer-events:auto; display:flex; align-items:center; gap:10px; padding:13px 16px; border-radius:var(--radius-md);
    background:var(--surface-solid); border:1px solid var(--border); box-shadow:var(--shadow); color:var(--text-primary);
    font-size:.86rem; transform:translateX(120%); opacity:0; transition:transform .32s ease, opacity .32s ease;
  }
  .toast.show{ transform:translateX(0); opacity:1; }
  .toast.hide{ transform:translateX(120%); opacity:0; }
  .toast-icon{ font-size:1.05rem; }
  .toast-msg{ flex:1; }
  .toast-close{ background:none; border:none; color:var(--text-secondary); font-size:1rem; padding:0 2px; }
  .toast-success .toast-icon{ color:var(--success); }
  .toast-warning .toast-icon{ color:var(--warning); }
  .toast-error .toast-icon{ color:var(--danger); }
  .toast-info .toast-icon{ color:var(--total); }

  /* ============================= CONFIRM MODAL ============================= */
  #confirmModal{ position:fixed; inset:0; z-index:10001; display:flex; align-items:center; justify-content:center; background:rgba(15,23,42,.45); backdrop-filter:blur(4px); opacity:0; visibility:hidden; transition:opacity .25s ease, visibility .25s ease; padding:20px; }
  #confirmModal.active{ opacity:1; visibility:visible; }
  .modal-box{ background:var(--surface-solid); border-radius:var(--radius-lg); padding:26px; max-width:420px; width:100%; box-shadow:var(--shadow); transform:scale(.94); transition:transform .25s ease; border:1px solid var(--border); }
  #confirmModal.active .modal-box{ transform:scale(1); }
  .modal-box h3{ font-size:1.05rem; margin-bottom:10px; }
  .modal-box p{ font-size:.88rem; color:var(--text-secondary); line-height:1.5; margin-bottom:20px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; }

  @media (max-width:600px){
    header.app-header{ padding:14px 16px; }
    .brand h1{ font-size:1.1rem; }
    .app-shell{ padding:16px 12px 50px; }
  }
</style>
</head>
<body>

  <!-- ============================= LOADING OVERLAY ============================= -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading Attendance Systems…</div>
  </div>

  <div class="bg-blob one"></div>
  <div class="bg-blob two"></div>

  <div class="app-shell">
    <!-- ============================= HEADER ============================= -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-emoji">📋</span>
        <div>
          <h1>Attendance Systems</h1>
          <p>Smart attendance, simplified.</p>
        </div>
      </div>
      <div class="header-right">
        <span id="headerClock">—</span>
        <button id="darkModeToggle" title="Toggle dark mode">🌙</button>
      </div>
    </header>

    <!-- ============================= NAV ============================= -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="mark">✅ Mark Attendance</button>
      <button class="tab-btn" data-tab="classes">🏫 Classes</button>
      <button class="tab-btn" data-tab="records">📊 Records</button>
    </nav>

    <!-- ============================= TAB: MARK ATTENDANCE ============================= -->
    <section id="tab-mark" class="tab-panel active">
      <div class="mark-controls glass-card">
        <form id="markForm" class="mark-form">
          <input id="rollInput" type="text" inputmode="numeric" placeholder="Enter student's roll number and press Enter…" autocomplete="off" autofocus />
          <button type="submit" class="btn btn-primary">Mark Attendance</button>
        </form>
        <div class="student-info-card" id="studentInfoCard"></div>
        <div class="status-preview" id="statusPreview"></div>
        <div class="field-group">
          <label for="markClassSelect">Class (auto-detected from roll number — change to browse another class)</label>
          <select id="markClassSelect"></select>
        </div>
        <div class="mark-controls-footer">
          <button id="markAllAbsentBtn" type="button" class="btn btn-outline-danger">Mark Remaining Absent</button>
        </div>
      </div>
      <div class="mark-lists" id="markListsContainer"></div>
    </section>

    <!-- ============================= TAB: CLASSES ============================= -->
    <section id="tab-classes" class="tab-panel">
      <form id="addClassForm" class="inline-form glass-card">
        <input id="newClassName" type="text" placeholder="New class name (e.g. Grade 10 - A)" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Add Class</button>
      </form>
      <div id="classesListContainer"></div>
      <div class="danger-zone">
        <p>Reset everything — deletes all classes, students, and attendance history. This cannot be undone.</p>
        <button id="resetAllBtn" type="button" class="btn btn-outline-danger">Reset All Data</button>
      </div>
    </section>

    <!-- ============================= TAB: RECORDS ============================= -->
    <section id="tab-records" class="tab-panel">
      <div class="records-controls glass-card">
        <select id="recordsClassSelect"></select>
        <input type="date" id="recordsDateInput" />
        <button id="recordsTodayBtn" type="button" class="btn btn-outline">Today</button>
        <input type="text" id="recordsSearchInput" placeholder="Search roll or name…" />
        <button id="exportCsvBtn" type="button" class="btn btn-outline">⬇ Export CSV</button>
      </div>
      <div class="records-summary" id="recordsSummary"></div>
      <div class="table-wrap glass-card">
        <table id="recordsTable">
          <thead>
            <tr>
              <th>Roll No.</th>
              <th>Name</th>
              <th>Status</th>
              <th>Time</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="recordsTbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- ============================= TOASTS ============================= -->
  <div id="toastContainer" aria-live="polite"></div>

  <!-- ============================= CONFIRM MODAL ============================= -->
  <div id="confirmModal">
    <div class="modal-box">
      <h3>Are you sure?</h3>
      <p id="confirmMessage">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" type="button" class="btn btn-outline">Cancel</button>
        <button id="confirmOkBtn" type="button" class="btn btn-outline-danger">Confirm</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  /* ============================================================
     SECTION 1: CONSTANTS & STATE
  ============================================================ */
  const STORAGE_KEY = "classroll_attendance_state_v1";
  const LATE_CUTOFF_SECONDS = 8 * 3600; // 08:00:00 — anyone at/after this is LATE
  const STATUS_COLOR = { present:"success", late:"warning", absent:"danger", unmarked:"muted" };

  let state = loadState();
  sanitizeState();

  const ui = {
    activeTab: "mark",
    markClassId: null,
    recordsClassId: null,
    recordsDate: null,
    recordsSearch: "",
    expandedClasses: new Set()
  };

  let els = {}; // cached DOM element references, populated on init
  let audioCtx = null;

  /* ============================================================
     SECTION 2: PERSISTENCE HELPERS
  ============================================================ */
  function defaultState(){
    return { classes: [], attendance: {}, settings: {} };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return {
        classes: Array.isArray(parsed.classes) ? parsed.classes : [],
        attendance: (parsed.attendance && typeof parsed.attendance === "object") ? parsed.attendance : {},
        settings: (parsed.settings && typeof parsed.settings === "object") ? parsed.settings : {}
      };
    }catch(err){
      console.warn("Attendance Systems: could not read saved data, starting fresh.", err);
      return defaultState();
    }
  }

  function sanitizeState(){
    state.classes.forEach(c=>{
      if(!Array.isArray(c.students)) c.students = [];
    });
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(err){
      console.warn("Attendance Systems: failed to save data.", err);
      showToast("Could not save data (storage may be full).", "error");
    }
  }

  /* ============================================================
     SECTION 3: GENERAL UTILITIES
  ============================================================ */
  function generateId(){
    return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[c]));
  }

  function todayKey(){
    return formatDateKey(new Date());
  }

  function formatDateKey(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function formatTime(d){
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2,"0");
    const s = String(d.getSeconds()).padStart(2,"0");
    const ampm = h >= 12 ? "PM" : "AM";
    let h12 = h % 12; if(h12 === 0) h12 = 12;
    return `${String(h12).padStart(2,"0")}:${m}:${s} ${ampm}`;
  }

  function formatFullDateTime(d){
    const dateStr = d.toLocaleDateString(undefined, { weekday:"short", year:"numeric", month:"short", day:"numeric" });
    return `${dateStr} • ${formatTime(d)}`;
  }

  function getStatusForNow(d){
    d = d || new Date();
    const secs = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
    return secs >= LATE_CUTOFF_SECONDS ? "late" : "present";
  }

  function compareRoll(a,b){
    return String(a).localeCompare(String(b), undefined, { numeric:true, sensitivity:"base" });
  }

  function csvEscape(val){
    const s = String(val === undefined || val === null ? "" : val);
    if(/[",\n\r]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }

  function sanitizeFilename(name){
    return name.replace(/[^a-z0-9]+/gi, "_");
  }

  /* ============================================================
     SECTION 4: DATA ACCESSORS
  ============================================================ */
  function getClassById(id){
    return state.classes.find(c=>c.id === id) || null;
  }

  // Roll numbers are unique per student across the whole school, so a roll
  // number lookup searches every class rather than requiring one to be
  // pre-selected. Returns { cls, student } or null.
  function findStudentGlobal(roll){
    const target = String(roll).toLowerCase();
    for(const cls of state.classes){
      const student = cls.students.find(s=>s.roll.toLowerCase() === target);
      if(student) return { cls, student };
    }
    return null;
  }

  function getSortedStudents(cls){
    return [...cls.students].sort((a,b)=>compareRoll(a.roll, b.roll));
  }

  function getAttendanceRecord(classId, dateKey, roll){
    return (state.attendance[classId] && state.attendance[classId][dateKey] && state.attendance[classId][dateKey][roll]) || null;
  }

  function setAttendanceRecord(classId, dateKey, roll, record){
    if(!state.attendance[classId]) state.attendance[classId] = {};
    if(!state.attendance[classId][dateKey]) state.attendance[classId][dateKey] = {};
    state.attendance[classId][dateKey][roll] = record;
  }

  function deleteAttendanceRecord(classId, dateKey, roll){
    if(state.attendance[classId] && state.attendance[classId][dateKey]){
      delete state.attendance[classId][dateKey][roll];
    }
  }

  /* ============================================================
     SECTION 5: SOUND EFFECTS (Web Audio API — no external files)
  ============================================================ */
  function ensureAudioCtx(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function beep(freq, duration, type, delay){
    const ctx = ensureAudioCtx();
    if(!ctx) return;
    const startAt = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, startAt);
    gain.gain.exponentialRampToValueAtTime(0.28, startAt + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.start(startAt);
    osc.stop(startAt + duration + 0.05);
  }

  function playSound(kind){
    try{
      switch(kind){
        case "present": beep(880, 0.16, "sine"); break;
        case "late":    beep(560, 0.14, "sine"); beep(560, 0.14, "sine", 0.18); break;
        case "absent":  beep(300, 0.30, "sine"); break;
        case "error":   beep(180, 0.30, "sawtooth"); break;
        case "info":    beep(660, 0.12, "sine"); break;
        default:        beep(440, 0.14, "sine");
      }
    }catch(err){
      console.warn("Attendance Systems: audio playback failed.", err);
    }
  }

  /* ============================================================
     SECTION 6: TOASTS
  ============================================================ */
  const TOAST_ICONS = { success:"✓", warning:"⏰", error:"✕", info:"ℹ" };

  function showToast(message, type){
    type = type || "info";
    const container = els.toastContainer;
    if(!container) return;
    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span class="toast-icon">${TOAST_ICONS[type] || "ℹ"}</span><span class="toast-msg"></span><button class="toast-close" aria-label="Dismiss">×</button>`;
    toast.querySelector(".toast-msg").textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(()=> toast.classList.add("show"));

    const remove = ()=>{
      toast.classList.remove("show");
      toast.classList.add("hide");
      setTimeout(()=> toast.remove(), 320);
    };
    const timer = setTimeout(remove, 3800);
    toast.querySelector(".toast-close").addEventListener("click", ()=>{
      clearTimeout(timer);
      remove();
    });
  }

  /* ============================================================
     SECTION 7: CONFIRM MODAL
  ============================================================ */
  function showConfirm(message, onConfirm){
    els.confirmMessage.textContent = message;
    els.confirmModal.classList.add("active");
    els.confirmOkBtn.onclick = ()=>{ hideConfirm(); onConfirm(); };
    els.confirmCancelBtn.onclick = ()=> hideConfirm();
  }

  function hideConfirm(){
    els.confirmModal.classList.remove("active");
  }

  /* ============================================================
     SECTION 8: DARK MODE
  ============================================================ */
  function applyInitialDarkMode(){
    const isDark = (typeof state.settings.darkMode === "boolean")
      ? state.settings.darkMode
      : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.classList.toggle("dark", isDark);
    updateDarkModeIcon(isDark);
  }

  function toggleDarkMode(){
    const isDark = document.documentElement.classList.toggle("dark");
    state.settings.darkMode = isDark;
    saveState();
    updateDarkModeIcon(isDark);
  }

  function updateDarkModeIcon(isDark){
    if(els.darkModeToggle) els.darkModeToggle.textContent = isDark ? "☀️" : "🌙";
  }

  /* ============================================================
     SECTION 9: CLOCK / LIVE PREVIEW
  ============================================================ */
  function updateHeaderClock(){
    if(els.headerClock) els.headerClock.textContent = formatFullDateTime(new Date());
  }

  function updateStatusPreview(){
    if(!els.statusPreview) return;
    const now = new Date();
    const status = getStatusForNow(now);
    const color = STATUS_COLOR[status];
    els.statusPreview.innerHTML = `<span class="pill ${color}">If marked now → ${status.toUpperCase()}</span><span class="preview-time">${formatTime(now)}</span>`;
  }

  /* ============================================================
     SECTION 10: TAB NAVIGATION
  ============================================================ */
  function switchTab(tabName){
    ui.activeTab = tabName;
    document.querySelectorAll(".tab-panel").forEach(p=>{
      p.classList.toggle("active", p.id === `tab-${tabName}`);
    });
    document.querySelectorAll(".tab-btn").forEach(b=>{
      b.classList.toggle("active", b.dataset.tab === tabName);
    });
    if(tabName === "mark") renderMarkLists();
    if(tabName === "classes") renderClassesTab();
    if(tabName === "records") renderRecordsTable();
  }

  /* ============================================================
     SECTION 11: CLASS SELECT DROPDOWNS
  ============================================================ */
  function populateClassSelect(selectEl, selectedId){
    if(!selectEl) return null;
    const classes = [...state.classes].sort((a,b)=>a.name.localeCompare(b.name));
    if(classes.length === 0){
      selectEl.innerHTML = `<option value="">No classes available</option>`;
      selectEl.disabled = true;
      return null;
    }
    selectEl.disabled = false;
    selectEl.innerHTML = classes.map(c=>`<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join("");
    const validId = classes.some(c=>c.id === selectedId) ? selectedId : classes[0].id;
    selectEl.value = validId;
    return validId;
  }

  function renderClassSelects(){
    ui.markClassId = populateClassSelect(els.markClassSelect, ui.markClassId);
    ui.recordsClassId = populateClassSelect(els.recordsClassSelect, ui.recordsClassId);
    state.settings.lastMarkClassId = ui.markClassId;
    state.settings.lastRecordsClassId = ui.recordsClassId;
    saveState();
  }

  /* ============================================================
     SECTION 12: MARK ATTENDANCE — RENDER & LOGIC
  ============================================================ */
  function renderMarkLists(){
    const container = els.markListsContainer;
    if(!container) return;
    const cls = getClassById(ui.markClassId);
    if(!cls){
      container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Create a class in the Classes tab to start marking attendance.</div>`;
      return;
    }
    const dateKey = todayKey();
    const students = getSortedStudents(cls);
    const groups = { present:[], late:[], absent:[], unmarked:[] };
    students.forEach(s=>{
      const rec = getAttendanceRecord(cls.id, dateKey, s.roll);
      if(!rec){ groups.unmarked.push(s); }
      else{ groups[rec.status] = groups[rec.status] || []; groups[rec.status].push({ ...s, time: rec.timeDisplay, source: rec.source }); }
    });

    const colDefs = [
      { key:"present",  label:"Present",    icon:"✓" },
      { key:"late",     label:"Late",       icon:"⏰" },
      { key:"absent",   label:"Absent",     icon:"✕" },
      { key:"unmarked", label:"Not Marked", icon:"…" }
    ];

    container.innerHTML = colDefs.map(col=>{
      const list = groups[col.key] || [];
      const itemsHtml = list.length ? list.map(s=>`
        <li class="student-row">
          <span class="student-roll">${escapeHtml(s.roll)}</span>
          <span class="student-name">${escapeHtml(s.name)}</span>
          ${col.key !== "unmarked" ? `<span class="student-time">${escapeHtml(s.time || "")}${s.source === "admin" ? " <em>(manual)</em>" : ""}</span>` : ""}
        </li>`).join("") : `<li class="empty-row">None</li>`;
      return `
        <div class="status-col glass-card">
          <div class="status-col-header ${STATUS_COLOR[col.key]}" style="padding:4px 6px;border-radius:10px;">
            <span>${col.icon}</span><span class="status-label">${col.label}</span>
            <span class="status-count">${list.length}</span>
          </div>
          <ul class="student-list">${itemsHtml}</ul>
        </div>`;
    }).join("");
  }

  function renderStudentInfoCard(data){
    const card = els.studentInfoCard;
    if(!card) return;
    if(!data){
      card.style.display = "none";
      card.innerHTML = "";
      return;
    }
    const { student, cls, status, time } = data;
    const color = STATUS_COLOR[status] || "muted";
    card.style.display = "flex";
    card.innerHTML = `
      <div class="student-info-main">
        <span class="student-info-name">${escapeHtml(student.name)}</span>
        <span class="student-info-meta">Roll ${escapeHtml(student.roll)} · ${escapeHtml(cls.name)}</span>
      </div>
      <span class="pill ${color}">${escapeHtml(status.toUpperCase())}${time ? " · " + escapeHtml(time) : ""}</span>
    `;
  }

  function handleMarkAttendance(e){
    e.preventDefault();
    const input = els.rollInput;
    const roll = input.value.trim();
    if(!roll){
      showToast("Please enter a roll number.", "error");
      playSound("error");
      return;
    }
    if(state.classes.length === 0){
      showToast("Add a class and some students first.", "error");
      playSound("error");
      return;
    }
    const found = findStudentGlobal(roll);
    if(!found){
      showToast(`No student found with roll number "${roll}".`, "error");
      playSound("error");
      renderStudentInfoCard(null);
      input.select();
      return;
    }
    const { cls, student } = found;
    // Auto-detect and switch to this student's class so the lists below reflect them.
    if(ui.markClassId !== cls.id){
      ui.markClassId = cls.id;
      state.settings.lastMarkClassId = ui.markClassId;
      if(els.markClassSelect) els.markClassSelect.value = cls.id;
      saveState();
    }
    const dateKey = todayKey();
    const existing = getAttendanceRecord(cls.id, dateKey, student.roll);
    if(existing){
      showToast(`${student.name} (${cls.name}) is already marked ${existing.status.toUpperCase()} today at ${existing.timeDisplay}.`, "info");
      playSound("info");
      renderStudentInfoCard({ student, cls, status: existing.status, time: existing.timeDisplay });
      input.value = "";
      input.focus();
      renderMarkLists();
      return;
    }
    const now = new Date();
    const status = getStatusForNow(now);
    setAttendanceRecord(cls.id, dateKey, student.roll, {
      status, timeDisplay: formatTime(now), timestamp: now.getTime(), source:"self"
    });
    saveState();
    showToast(`${student.name} (${cls.name}) marked ${status.toUpperCase()} at ${formatTime(now)}.`, status === "present" ? "success" : "warning");
    playSound(status);
    renderStudentInfoCard({ student, cls, status, time: formatTime(now) });
    input.value = "";
    input.focus();
    renderMarkLists();
  }

  function handleMarkAllAbsent(){
    const cls = getClassById(ui.markClassId);
    if(!cls){
      showToast("Please select a class first.", "error");
      return;
    }
    const dateKey = todayKey();
    const unmarked = cls.students.filter(s=>!getAttendanceRecord(cls.id, dateKey, s.roll));
    if(unmarked.length === 0){
      showToast("Everyone in this class is already marked today.", "info");
      return;
    }
    showConfirm(`Mark ${unmarked.length} unmarked student(s) in ${cls.name} as ABSENT for today?`, ()=>{
      const now = new Date();
      unmarked.forEach(s=>{
        setAttendanceRecord(cls.id, dateKey, s.roll, { status:"absent", timeDisplay:"—", timestamp: now.getTime(), source:"admin" });
      });
      saveState();
      showToast(`${unmarked.length} student(s) marked absent.`, "error");
      playSound("absent");
      renderMarkLists();
    });
  }

  /* ============================================================
     SECTION 13: CLASSES TAB — RENDER & LOGIC
  ============================================================ */
  function renderClassesTab(){
    const container = els.classesListContainer;
    if(!container) return;
    if(state.classes.length === 0){
      container.innerHTML = `<div class="empty-state glass-card">No classes yet. Add your first class above to get started.</div>`;
      return;
    }
    const sorted = [...state.classes].sort((a,b)=>a.name.localeCompare(b.name));
    container.innerHTML = sorted.map(cls=>{
      const expanded = ui.expandedClasses.has(cls.id);
      const students = getSortedStudents(cls);
      const studentsHtml = students.length ? students.map(s=>`
        <li class="student-row">
          <span class="student-roll">${escapeHtml(s.roll)}</span>
          <span class="student-name">${escapeHtml(s.name)}</span>
          <button class="icon-btn danger" data-action="delete-student" data-class-id="${cls.id}" data-roll="${escapeHtml(s.roll)}" title="Remove student">🗑</button>
        </li>`).join("") : `<li class="empty-row">No students added yet.</li>`;
      return `
      <div class="class-card glass-card">
        <div class="class-card-header" data-action="toggle-class" data-class-id="${cls.id}">
          <div class="class-card-title">
            <span class="chevron ${expanded ? "open" : ""}">▸</span>
            <span class="class-name">${escapeHtml(cls.name)}</span>
            <span class="class-count">${students.length} student${students.length !== 1 ? "s" : ""}</span>
          </div>
          <button class="icon-btn danger" data-action="delete-class" data-class-id="${cls.id}" title="Delete class">🗑</button>
        </div>
        <div class="class-card-body ${expanded ? "open" : ""}">
          <div class="ccb-inner">
            <form class="inline-form add-student-form" data-class-id="${cls.id}">
              <input type="text" placeholder="Roll number" data-field="roll" autocomplete="off" required />
              <input type="text" placeholder="Student name" data-field="name" autocomplete="off" required />
              <button type="submit" class="btn btn-secondary">Add Student</button>
            </form>
            <ul class="student-list">${studentsHtml}</ul>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  function toggleClassExpand(classId){
    if(ui.expandedClasses.has(classId)) ui.expandedClasses.delete(classId);
    else ui.expandedClasses.add(classId);
    renderClassesTab();
  }

  function handleAddClass(e){
    e.preventDefault();
    const input = els.newClassName;
    const name = input.value.trim();
    if(!name){
      showToast("Class name cannot be empty.", "error");
      return;
    }
    const exists = state.classes.some(c=>c.name.toLowerCase() === name.toLowerCase());
    if(exists){
      showToast("A class with this name already exists.", "error");
      return;
    }
    state.classes.push({ id: generateId(), name, students: [] });
    saveState();
    input.value = "";
    showToast(`Class "${name}" created.`, "success");
    renderClassesTab();
    renderClassSelects();
    if(ui.activeTab === "mark") renderMarkLists();
  }

  function handleDeleteClass(classId){
    const cls = getClassById(classId);
    if(!cls) return;
    showConfirm(`Delete class "${cls.name}" and all its attendance records? This cannot be undone.`, ()=>{
      state.classes = state.classes.filter(c=>c.id !== classId);
      delete state.attendance[classId];
      ui.expandedClasses.delete(classId);
      if(ui.markClassId === classId) ui.markClassId = null;
      if(ui.recordsClassId === classId) ui.recordsClassId = null;
      saveState();
      showToast(`Class "${cls.name}" deleted.`, "error");
      renderClassesTab();
      renderClassSelects();
      renderMarkLists();
      renderRecordsTable();
    });
  }

  function handleAddStudent(classId, rollInput, nameInput){
    const cls = getClassById(classId);
    if(!cls) return;
    const roll = rollInput.value.trim();
    const name = nameInput.value.trim();
    if(!roll || !name){
      showToast("Please enter both roll number and name.", "error");
      return;
    }
    const dupMatch = findStudentGlobal(roll);
    if(dupMatch){
      const msg = dupMatch.cls.id === cls.id
        ? `Roll number "${roll}" already exists in ${cls.name}.`
        : `Roll number "${roll}" is already assigned to ${dupMatch.student.name} in ${dupMatch.cls.name}. Roll numbers must be unique across all classes.`;
      showToast(msg, "error");
      return;
    }
    cls.students.push({ roll, name });
    saveState();
    showToast(`${name} added to ${cls.name}.`, "success");
    ui.expandedClasses.add(classId);
    renderClassesTab();
    renderClassSelects();
    if(ui.activeTab === "mark" && ui.markClassId === classId) renderMarkLists();
    const freshRollInput = els.classesListContainer.querySelector(`.add-student-form[data-class-id="${classId}"] [data-field="roll"]`);
    if(freshRollInput) freshRollInput.focus();
  }

  function handleDeleteStudent(classId, roll){
    const cls = getClassById(classId);
    if(!cls) return;
    const student = cls.students.find(s=>s.roll === roll);
    if(!student) return;
    showConfirm(`Remove ${student.name} (Roll ${student.roll}) from ${cls.name}? Their attendance history will also be deleted.`, ()=>{
      cls.students = cls.students.filter(s=>s.roll !== roll);
      if(state.attendance[classId]){
        Object.keys(state.attendance[classId]).forEach(date=>{
          delete state.attendance[classId][date][roll];
        });
      }
      saveState();
      showToast(`${student.name} removed.`, "error");
      ui.expandedClasses.add(classId);
      renderClassesTab();
      renderClassSelects();
      if(ui.activeTab === "mark") renderMarkLists();
      if(ui.activeTab === "records") renderRecordsTable();
    });
  }

  function handleResetAllData(){
    showConfirm("This will permanently delete ALL classes, students, and attendance records. This cannot be undone. Continue?", ()=>{
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      ui.markClassId = null;
      ui.recordsClassId = null;
      ui.expandedClasses.clear();
      ui.recordsSearch = "";
      if(els.recordsSearchInput) els.recordsSearchInput.value = "";
      ui.recordsDate = todayKey();
      if(els.recordsDateInput) els.recordsDateInput.value = ui.recordsDate;
      saveState();
      renderClassSelects();
      renderClassesTab();
      renderMarkLists();
      renderRecordsTable();
      showToast("All data has been reset.", "error");
    });
  }

  /* ============================================================
     SECTION 14: RECORDS TAB — RENDER & LOGIC
  ============================================================ */
  function renderRecordsTable(){
    const tbody = els.recordsTbody;
    const summary = els.recordsSummary;
    if(!tbody || !summary) return;
    const cls = getClassById(ui.recordsClassId);
    if(!cls){
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Select a class to view records.</td></tr>`;
      summary.innerHTML = "";
      return;
    }
    const dateKey = ui.recordsDate || todayKey();
    const allStudents = getSortedStudents(cls);

    const counts = { present:0, late:0, absent:0, unmarked:0 };
    allStudents.forEach(s=>{
      const rec = getAttendanceRecord(cls.id, dateKey, s.roll);
      const status = rec ? rec.status : "unmarked";
      counts[status] = (counts[status] || 0) + 1;
    });

    const search = ui.recordsSearch.trim().toLowerCase();
    const filtered = search
      ? allStudents.filter(s=>s.roll.toLowerCase().includes(search) || s.name.toLowerCase().includes(search))
      : allStudents;

    tbody.innerHTML = filtered.length ? filtered.map(s=>{
      const rec = getAttendanceRecord(cls.id, dateKey, s.roll);
      const status = rec ? rec.status : "unmarked";
      const time = rec ? rec.timeDisplay : "—";
      const manualTag = (rec && rec.source === "admin") ? `<span class="tag-manual">manual</span>` : "";
      const label = status.charAt(0).toUpperCase() + status.slice(1);
      return `
        <tr>
          <td>${escapeHtml(s.roll)}</td>
          <td>${escapeHtml(s.name)}</td>
          <td><span class="badge ${STATUS_COLOR[status]}">${label}</span>${manualTag}</td>
          <td>${escapeHtml(time)}</td>
          <td>
            <select class="status-select" data-action="change-status" data-roll="${escapeHtml(s.roll)}">
              <option value="unmarked" ${status === "unmarked" ? "selected" : ""}>Not Marked</option>
              <option value="present" ${status === "present" ? "selected" : ""}>Present</option>
              <option value="late" ${status === "late" ? "selected" : ""}>Late</option>
              <option value="absent" ${status === "absent" ? "selected" : ""}>Absent</option>
            </select>
          </td>
        </tr>`;
    }).join("") : `<tr><td colspan="5" class="empty-state">No matching students.</td></tr>`;

    summary.innerHTML = `
      <span class="summary-pill total">Total: ${allStudents.length}</span>
      <span class="summary-pill success">Present: ${counts.present}</span>
      <span class="summary-pill warning">Late: ${counts.late}</span>
      <span class="summary-pill danger">Absent: ${counts.absent}</span>
      <span class="summary-pill muted">Not Marked: ${counts.unmarked}</span>
    `;
  }

  function handleStatusOverride(roll, newStatus){
    const classId = ui.recordsClassId;
    const dateKey = ui.recordsDate || todayKey();
    const cls = getClassById(classId);
    if(!cls) return;
    const student = cls.students.find(s=>s.roll === roll);
    if(!student) return;

    if(newStatus === "unmarked"){
      deleteAttendanceRecord(classId, dateKey, roll);
      saveState();
      showToast(`${student.name}'s attendance was reset.`, "info");
    }else{
      const now = new Date();
      setAttendanceRecord(classId, dateKey, roll, {
        status: newStatus,
        timeDisplay: newStatus === "absent" ? "—" : formatTime(now),
        timestamp: now.getTime(),
        source: "admin"
      });
      saveState();
      const toastType = newStatus === "present" ? "success" : newStatus === "late" ? "warning" : "error";
      showToast(`${student.name} set to ${newStatus.toUpperCase()}.`, toastType);
    }
    renderRecordsTable();
    if(ui.activeTab !== "mark") renderMarkLists(); // keep mark tab fresh for next visit
  }

  function handleExportCsv(){
    const cls = getClassById(ui.recordsClassId);
    if(!cls){
      showToast("Select a class first.", "error");
      return;
    }
    const dateKey = ui.recordsDate || todayKey();
    const students = getSortedStudents(cls);
    const rows = [["Roll No", "Name", "Status", "Time"]];
    students.forEach(s=>{
      const rec = getAttendanceRecord(cls.id, dateKey, s.roll);
      rows.push([s.roll, s.name, rec ? rec.status : "unmarked", rec ? rec.timeDisplay : ""]);
    });
    const csv = rows.map(r=>r.map(csvEscape).join(",")).join("\r\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `attendance_${sanitizeFilename(cls.name)}_${dateKey}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    showToast("CSV exported.", "success");
  }

  /* ============================================================
     SECTION 15: EVENT BINDING
  ============================================================ */
  function cacheElements(){
    els = {
      loadingOverlay: document.getElementById("loadingOverlay"),
      headerClock: document.getElementById("headerClock"),
      darkModeToggle: document.getElementById("darkModeToggle"),

      markClassSelect: document.getElementById("markClassSelect"),
      markForm: document.getElementById("markForm"),
      rollInput: document.getElementById("rollInput"),
      studentInfoCard: document.getElementById("studentInfoCard"),
      statusPreview: document.getElementById("statusPreview"),
      markAllAbsentBtn: document.getElementById("markAllAbsentBtn"),
      markListsContainer: document.getElementById("markListsContainer"),

      addClassForm: document.getElementById("addClassForm"),
      newClassName: document.getElementById("newClassName"),
      classesListContainer: document.getElementById("classesListContainer"),
      resetAllBtn: document.getElementById("resetAllBtn"),

      recordsClassSelect: document.getElementById("recordsClassSelect"),
      recordsDateInput: document.getElementById("recordsDateInput"),
      recordsTodayBtn: document.getElementById("recordsTodayBtn"),
      recordsSearchInput: document.getElementById("recordsSearchInput"),
      exportCsvBtn: document.getElementById("exportCsvBtn"),
      recordsSummary: document.getElementById("recordsSummary"),
      recordsTbody: document.getElementById("recordsTbody"),

      toastContainer: document.getElementById("toastContainer"),
      confirmModal: document.getElementById("confirmModal"),
      confirmMessage: document.getElementById("confirmMessage"),
      confirmOkBtn: document.getElementById("confirmOkBtn"),
      confirmCancelBtn: document.getElementById("confirmCancelBtn")
    };
  }

  function bindEvents(){
    document.querySelectorAll(".tab-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>switchTab(btn.dataset.tab));
    });

    els.darkModeToggle.addEventListener("click", toggleDarkMode);

    // Mark Attendance tab
    els.markForm.addEventListener("submit", handleMarkAttendance);
    els.markClassSelect.addEventListener("change", ()=>{
      ui.markClassId = els.markClassSelect.value;
      state.settings.lastMarkClassId = ui.markClassId;
      saveState();
      renderMarkLists();
      renderStudentInfoCard(null);
      els.rollInput.focus();
    });
    els.markAllAbsentBtn.addEventListener("click", handleMarkAllAbsent);

    // Classes tab
    els.addClassForm.addEventListener("submit", handleAddClass);
    els.resetAllBtn.addEventListener("click", handleResetAllData);
    els.classesListContainer.addEventListener("click", (e)=>{
      const deleteClassBtn = e.target.closest('[data-action="delete-class"]');
      if(deleteClassBtn){ e.stopPropagation(); handleDeleteClass(deleteClassBtn.dataset.classId); return; }
      const deleteStudentBtn = e.target.closest('[data-action="delete-student"]');
      if(deleteStudentBtn){ e.stopPropagation(); handleDeleteStudent(deleteStudentBtn.dataset.classId, deleteStudentBtn.dataset.roll); return; }
      const toggleTarget = e.target.closest('[data-action="toggle-class"]');
      if(toggleTarget){ toggleClassExpand(toggleTarget.dataset.classId); }
    });
    els.classesListContainer.addEventListener("submit", (e)=>{
      const form = e.target.closest(".add-student-form");
      if(!form) return;
      e.preventDefault();
      const classId = form.dataset.classId;
      const rollInput = form.querySelector('[data-field="roll"]');
      const nameInput = form.querySelector('[data-field="name"]');
      handleAddStudent(classId, rollInput, nameInput);
    });

    // Records tab
    els.recordsClassSelect.addEventListener("change", ()=>{
      ui.recordsClassId = els.recordsClassSelect.value;
      state.settings.lastRecordsClassId = ui.recordsClassId;
      saveState();
      renderRecordsTable();
    });
    els.recordsDateInput.addEventListener("change", ()=>{
      ui.recordsDate = els.recordsDateInput.value || todayKey();
      renderRecordsTable();
    });
    els.recordsTodayBtn.addEventListener("click", ()=>{
      ui.recordsDate = todayKey();
      els.recordsDateInput.value = ui.recordsDate;
      renderRecordsTable();
    });
    els.recordsSearchInput.addEventListener("input", ()=>{
      ui.recordsSearch = els.recordsSearchInput.value;
      renderRecordsTable();
    });
    els.exportCsvBtn.addEventListener("click", handleExportCsv);
    els.recordsTbody.addEventListener("change", (e)=>{
      const select = e.target.closest('select[data-action="change-status"]');
      if(!select) return;
      handleStatusOverride(select.dataset.roll, select.value);
    });

    // Confirm modal: backdrop click + Escape key
    els.confirmModal.addEventListener("click", (e)=>{
      if(e.target === els.confirmModal) hideConfirm();
    });
    document.addEventListener("keydown", (e)=>{
      if(e.key === "Escape" && els.confirmModal.classList.contains("active")) hideConfirm();
    });
  }

  /* ============================================================
     SECTION 16: INITIALIZATION
  ============================================================ */
  function init(){
    cacheElements();
    applyInitialDarkMode();

    ui.markClassId = state.settings.lastMarkClassId || null;
    ui.recordsClassId = state.settings.lastRecordsClassId || null;
    ui.recordsDate = todayKey();
    els.recordsDateInput.value = ui.recordsDate;

    bindEvents();
    renderClassSelects();
    renderClassesTab();
    renderMarkLists();
    renderRecordsTable();
    updateHeaderClock();
    updateStatusPreview();

    setInterval(()=>{
      updateHeaderClock();
      updateStatusPreview();
    }, 1000);

    setTimeout(()=>{
      els.loadingOverlay.classList.add("hide");
      if(getClassById(ui.markClassId)) els.rollInput.focus();
    }, 550);
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>

// ---------- localStorage-backed storage shim (replaces the artifacts window.storage API) ----------
if (!window.storage) {
  window.storage = {
    async get(key) {
      try {
        const value = window.localStorage.getItem(key);
        return value === null ? null : { key, value, shared: false };
      } catch (e) {
        return null;
      }
    },
    async set(key, value) {
      try {
        window.localStorage.setItem(key, value);
        return { key, value, shared: false };
      } catch (e) {
        return null;
      }
    },
    async delete(key) {
      try {
        window.localStorage.removeItem(key);
        return { key, deleted: true, shared: false };
      } catch (e) {
        return null;
      }
    },
  };
}

}

const STORAGE_KEY = "kiosk-register-v1";
const uid = () => Math.random().toString(36).slice(2, 10);
const pad2 = (n) => String(n).padStart(2, "0");

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
};

const timeStr = (d) => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;

const displayTime = (d) => {
  let h = d.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return { h: pad2(h), m: pad2(d.getMinutes()), s: pad2(d.getSeconds()), ampm };
};

const formatDateNice = (iso) => {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
};

const defaultData = () => ({
  classes: [],
  students: [],
  attendance: {},
  settings: { lateAfter: "07:59" },
});

const computeStatus = (now, lateAfter) => {
  const [cutH, cutM] = lateAfter.split(":").map(Number);
  const hh = now.getHours(), mm = now.getMinutes();
  if (hh < cutH || (hh === cutH && mm <= cutM)) return "present";
  return "late";
};

// ---------- Sound engine (synthesized, no audio files needed) ----------
function useSoundEngine(enabled) {
  const ctxRef = useRef(null);
  const getCtx = () => {
    if (!enabled) return null;
    try {
      if (!ctxRef.current) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctxRef.current = new AC();
      }
      if (ctxRef.current.state === "suspended") ctxRef.current.resume();
      return ctxRef.current;
    } catch (e) {
      return null;
    }
  };

  const tone = (ctx, freq, start, dur, type = "sine", peak = 0.22) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(peak, start + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.02);
  };

  const play = (kind) => {
    const ctx = getCtx();
    if (!ctx) return;
    const t0 = ctx.currentTime;
    if (kind === "present") {
      // bright ascending arpeggio
      [523.25, 659.25, 783.99].forEach((f, i) => tone(ctx, f, t0 + i * 0.07, 0.28, "sine", 0.2));
    } else if (kind === "late") {
      // gentle downward slide — "tardy" feel, still friendly
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(392, t0);
      osc.frequency.exponentialRampToValueAtTime(311, t0 + 0.32);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.2, t0 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.42);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.45);
    } else if (kind === "error") {
      // two short low blips
      [0, 1].forEach((i) => tone(ctx, 175, t0 + i * 0.13, 0.1, "square", 0.14));
    } else {
      tone(ctx, 440, t0, 0.14, "sine", 0.12);
    }
  };

  return play;
}

function AnalogClock({ now, pulseKey }) {
  const hours = now.getHours() % 12;
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  const hourDeg = (hours + minutes / 60) * 30;
  const minDeg = (minutes + seconds / 60) * 6;
  const secDeg = seconds * 6;
  const ticks = Array.from({ length: 12 }, (_, i) => i);
  const secX = 88 + 66 * Math.sin((secDeg * Math.PI) / 180);
  const secY = 88 - 66 * Math.cos((secDeg * Math.PI) / 180);

  return (
    <svg width="168" height="168" viewBox="0 0 176 176">
      <circle cx="88" cy="88" r="80" fill="#FCFBF8" stroke="#E3DFD3" strokeWidth="1.5" />
      {ticks.map((i) => {
        const major = i % 3 === 0;
        const angle = (i * 30 * Math.PI) / 180;
        const x1 = 88 + (major ? 64 : 68) * Math.sin(angle), y1 = 88 - (major ? 64 : 68) * Math.cos(angle);
        const x2 = 88 + 74 * Math.sin(angle), y2 = 88 - 74 * Math.cos(angle);
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#2A2520" strokeWidth={major ? 2 : 1} strokeLinecap="round" opacity={major ? 0.85 : 0.35} />;
      })}
      <line x1="88" y1="88" x2={88 + 40 * Math.sin((hourDeg * Math.PI) / 180)} y2={88 - 40 * Math.cos((hourDeg * Math.PI) / 180)} stroke="#2A2520" strokeWidth="3.5" strokeLinecap="round" />
      <line x1="88" y1="88" x2={88 + 58 * Math.sin((minDeg * Math.PI) / 180)} y2={88 - 58 * Math.cos((minDeg * Math.PI) / 180)} stroke="#2A2520" strokeWidth="2.25" strokeLinecap="round" />
      <line x1="88" y1="88" x2={secX} y2={secY} stroke="#B23A2E" strokeWidth="1" strokeLinecap="round" />
      <circle key={pulseKey} cx={secX} cy={secY} r="2.6" fill="#B23A2E" className="rr-sec-pulse" />
      <circle cx="88" cy="88" r="3.5" fill="#2A2520" />
    </svg>
  );
}

function BurstEffect({ triggerKey, kind }) {
  if (!triggerKey) return null;
  const color = kind === "present" ? "#3C6E47" : "#B8860B";
  const dots = Array.from({ length: 6 }, (_, i) => i);
  return (
    <div key={triggerKey} style={styles.burstWrap} aria-hidden="true">
      {dots.map((i) => {
        const angle = (i / dots.length) * 360;
        return (
          <span
            key={i}
            className="rr-burst-dot"
            style={{
              "--angle": `${angle}deg`,
              background: color,
            }}
          />
        );
      })}
    </div>
  );
}

function AttendanceKiosk() {
  const [data, setData] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [view, setView] = useState("kiosk");
  const [now, setNow] = useState(new Date());
  const [soundOn, setSoundOn] = useState(true);

  const [kioskClassId, setKioskClassId] = useState(null);
  const [rollInput, setRollInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [shake, setShake] = useState(false);
  const [burstKey, setBurstKey] = useState(null);
  const inputRef = useRef(null);
  const feedbackTimer = useRef(null);
  const shakeTimer = useRef(null);

  const [dashClassId, setDashClassId] = useState(null);
  const [dashDate, setDashDate] = useState(todayStr());

  const [newClassName, setNewClassName] = useState("");
  const [manageClassId, setManageClassId] = useState(null);
  const [newStudentName, setNewStudentName] = useState("");
  const [newStudentRoll, setNewStudentRoll] = useState("");
  const [confirmDeleteClass, setConfirmDeleteClass] = useState(null);
  const [confirmDeleteStudent, setConfirmDeleteStudent] = useState(null);

  const playSound = useSoundEngine(soundOn);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (cancelled) return;
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          const merged = { ...defaultData(), ...parsed, settings: { ...defaultData().settings, ...(parsed.settings || {}) } };
          setData(merged);
          const firstClass = merged.classes[0];
          if (firstClass) {
            setKioskClassId(firstClass.id);
            setDashClassId(firstClass.id);
            setManageClassId(firstClass.id);
          }
        } else {
          setData(defaultData());
        }
      } catch (e) {
        setData(defaultData());
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const persist = useCallback(async (next) => {
    setSaving(true);
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(next), false);
      setError(result ? null : "Could not save. Your changes may not persist.");
    } catch (e) {
      setError("Could not save. Your changes may not persist.");
    } finally {
      setSaving(false);
    }
  }, []);

  const update = useCallback((updater) => {
    setData((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      persist(next);
      return next;
    });
  }, [persist]);

  useEffect(() => {
    if (view === "kiosk" && inputRef.current) inputRef.current.focus();
  }, [view, kioskClassId]);

  if (!loaded || !data) {
    return (
      <div style={styles.loadingScreen}>
        <div className="rr-load-pulse" style={styles.loadingMark} />
        <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: 12, color: "#8a8371", letterSpacing: "0.15em" }}>OPENING REGISTER…</div>
      </div>
    );
  }

  const classes = data.classes;

  const showFeedback = (fb) => {
    if (feedbackTimer.current) clearTimeout(feedbackTimer.current);
    setFeedback(fb);
    feedbackTimer.current = setTimeout(() => setFeedback(null), 3200);
  };

  const triggerShake = () => {
    if (shakeTimer.current) clearTimeout(shakeTimer.current);
    setShake(true);
    shakeTimer.current = setTimeout(() => setShake(false), 420);
  };

  const handleCheckIn = () => {
    const roll = rollInput.trim();
    if (!roll || !kioskClassId) return;
    const student = data.students.find((s) => s.classId === kioskClassId && s.roll.toLowerCase() === roll.toLowerCase());
    if (!student) {
      playSound("error");
      triggerShake();
      showFeedback({ kind: "error", text: "Roll number not found", sub: `No student with roll "${roll}" in this class.` });
      setRollInput("");
      return;
    }
    const today = todayStr();
    const existing = data.attendance[kioskClassId]?.[today]?.[student.id];
    if (existing) {
      playSound("info");
      showFeedback({ kind: "info", text: `Already checked in — ${student.name}`, sub: `Marked ${existing.status} at ${existing.time}` });
      setRollInput("");
      return;
    }
    const status = computeStatus(now, data.settings.lateAfter);
    const record = { status, time: timeStr(now) };
    update((prev) => {
      const classAtt = { ...(prev.attendance[kioskClassId] || {}) };
      const dayAtt = { ...(classAtt[today] || {}) };
      dayAtt[student.id] = record;
      classAtt[today] = dayAtt;
      return { ...prev, attendance: { ...prev.attendance, [kioskClassId]: classAtt } };
    });
    playSound(status);
    setBurstKey(uid());
    showFeedback({
      kind: status,
      text: `${student.name}`,
      sub: status === "present" ? `Marked present at ${record.time}` : `Marked late at ${record.time}`,
    });
    setRollInput("");
  };

  const dashClass = classes.find((c) => c.id === dashClassId) || null;
  const dashStudents = data.students
    .filter((s) => s.classId === dashClassId)
    .sort((a, b) => (a.roll || "").localeCompare(b.roll || "", undefined, { numeric: true }));
  const dashRecords = (dashClassId && data.attendance[dashClassId]?.[dashDate]) || {};
  const presentList = [], lateList = [], absentList = [];
  dashStudents.forEach((s) => {
    const rec = dashRecords[s.id];
    if (!rec) absentList.push(s);
    else if (rec.status === "late") lateList.push(s);
    else presentList.push(s);
  });

  const cycleStatus = (studentId) => {
    update((prev) => {
      const classAtt = { ...(prev.attendance[dashClassId] || {}) };
      const dayAtt = { ...(classAtt[dashDate] || {}) };
      const current = dayAtt[studentId]?.status || "absent";
      const order = ["present", "late", "absent"];
      const next = order[(order.indexOf(current) + 1) % 3];
      if (next === "absent") delete dayAtt[studentId];
      else dayAtt[studentId] = { status: next, time: dayAtt[studentId]?.time || "manual" };
      classAtt[dashDate] = dayAtt;
      return { ...prev, attendance: { ...prev.attendance, [dashClassId]: classAtt } };
    });
  };

  const addClass = () => {
    const name = newClassName.trim();
    if (!name) return;
    const newClass = { id: uid(), name };
    update((prev) => ({ ...prev, classes: [...prev.classes, newClass] }));
    setManageClassId(newClass.id);
    if (!kioskClassId) setKioskClassId(newClass.id);
    if (!dashClassId) setDashClassId(newClass.id);
    setNewClassName("");
  };

  const deleteClass = (classId) => {
    update((prev) => {
      const attendance = { ...prev.attendance };
      delete attendance[classId];
      return {
        ...prev,
        classes: prev.classes.filter((c) => c.id !== classId),
        students: prev.students.filter((s) => s.classId !== classId),
        attendance,
      };
    });
    const remaining = classes.filter((c) => c.id !== classId);
    const fallback = remaining[0]?.id || null;
    if (manageClassId === classId) setManageClassId(fallback);
    if (kioskClassId === classId) setKioskClassId(fallback);
    if (dashClassId === classId) setDashClassId(fallback);
    setConfirmDeleteClass(null);
  };

  const addStudent = () => {
    const name = newStudentName.trim();
    const roll = newStudentRoll.trim();
    if (!name || !roll || !manageClassId) return;
    const dup = data.students.some((s) => s.classId === manageClassId && s.roll.toLowerCase() === roll.toLowerCase());
    if (dup) { setError(`Roll "${roll}" already exists in this class.`); return; }
    const student = { id: uid(), classId: manageClassId, name, roll };
    update((prev) => ({ ...prev, students: [...prev.students, student] }));
    setNewStudentName("");
    setNewStudentRoll("");
  };

  const deleteStudent = (studentId) => {
    update((prev) => ({ ...prev, students: prev.students.filter((s) => s.id !== studentId) }));
    setConfirmDeleteStudent(null);
  };

  const updateLateAfter = (val) => {
    update((prev) => ({ ...prev, settings: { ...prev.settings, lateAfter: val } }));
  };

  const manageClass = classes.find((c) => c.id === manageClassId) || null;
  const manageStudents = data.students
    .filter((s) => s.classId === manageClassId)
    .sort((a, b) => (a.roll || "").localeCompare(b.roll || "", undefined, { numeric: true }));

  const clock = displayTime(now);

  return (
    <div style={styles.page}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Courier+Prime:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        html, body { margin: 0; max-width: 100%; overflow-x: hidden; }
        img, svg { max-width: 100%; }

        .rr-btn { transition: transform 0.12s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease; }
        .rr-btn:hover { opacity: 0.85; }
        .rr-btn:active { transform: scale(0.97); }
        .rr-nav { position: relative; transition: color 0.2s ease; }
        .rr-row { transition: background 0.15s ease; }
        .rr-row:hover { background: #F2EEE4 !important; }

        .rr-feedback { animation: feedIn 0.3s ease-out; }
        @keyframes feedIn { 0% { transform: translateY(6px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .rr-shake { animation: shake 0.36s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(4px); } 75% { transform: translateX(-2px); } }

        .rr-view-enter { animation: viewIn 0.25s ease-out; }
        @keyframes viewIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }

        .rr-sec-pulse { animation: secPulse 1s ease-out; transform-origin: center; }
        @keyframes secPulse { 0% { r: 2.6; opacity: 0.9; } 100% { r: 7; opacity: 0; } }

        .rr-card-in { animation: cardIn 0.3s ease-out; }
        @keyframes cardIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

        .rr-burst-dot {
          position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border-radius: 50%;
          animation: burstFly 0.55s ease-out forwards;
          transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0);
        }
        @keyframes burstFly {
          0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) scale(1); opacity: 0.9; }
          100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-46px) scale(0.4); opacity: 0; }
        }

        .rr-kiosk-input:focus { box-shadow: 0 0 0 3px rgba(42,37,32,0.12); }
        .rr-pill:hover { filter: brightness(0.97); }
        .rr-stat-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .rr-stat-card:hover { transform: translateY(-1px); }

        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #D8D2C2; border-radius: 4px; }
        input:focus, button:focus-visible, select:focus-visible { outline: 2px solid #2A2520; outline-offset: 2px; }

        .rr-load-pulse { animation: loadPulse 1.1s ease-in-out infinite; }
        @keyframes loadPulse { 0%, 100% { opacity: 0.35; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        @media (prefers-reduced-motion: reduce) {
          .rr-btn, .rr-feedback, .rr-shake, .rr-view-enter, .rr-sec-pulse, .rr-card-in, .rr-burst-dot, .rr-stat-card, .rr-load-pulse { animation: none !important; transition: none !important; }
        }

function KioskView({ classes, kioskClassId, setKioskClassId, rollInput, setRollInput, handleCheckIn, feedback, now, clock, inputRef, lateAfter, shake, burstKey }) {
  if (classes.length === 0) {
    return (
      <div style={styles.emptyState}>
        <div style={styles.emptyStamp}>NO CLASSES YET</div>
        <p style={styles.emptyText}>Go to Manage to add a class and students before opening Marking.</p>
      </div>
    );
  }
  return (
    <div style={styles.kioskWrap}>
      <div style={styles.clockPanel}>
        <AnalogClock now={now} pulseKey={now.getSeconds()} />
        <div style={styles.digitalTime}>
          {clock.h}:{clock.m}:<span style={{ color: "#B23A2E" }}>{clock.s}</span> <span style={{ fontSize: 15 }}>{clock.ampm}</span>
        </div>
        <div style={styles.cutoffNote}>Late after {lateAfter}</div>
      </div>

      <div className={`rr-card-in rr-kiosk-card ${shake ? "rr-shake" : ""}`} style={styles.kioskCard}>
        {classes.length > 1 && (
          <select value={kioskClassId || ""} onChange={(e) => setKioskClassId(e.target.value)} style={styles.classSelect}>
            {classes.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        )}
        <label style={styles.kioskLabel}>Enter your roll number</label>
        <div style={{ position: "relative" }}>
          <div style={styles.kioskInputRow}>
            <input
              ref={inputRef}
              value={rollInput}
              onChange={(e) => setRollInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleCheckIn()}
              placeholder="e.g. 14"
              className="rr-kiosk-input"
              style={styles.kioskInput}
              autoFocus
            />
            <button className="rr-btn" onClick={handleCheckIn} style={styles.kioskSubmit}>
              <ChevronRight size={20} />
            </button>
          </div>
          <BurstEffect triggerKey={burstKey} kind={feedback?.kind} />
        </div>

        <div style={{ minHeight: 92 }}>
          {feedback && (
            <div className="rr-feedback" style={{ ...styles.feedbackCard, ...feedbackStyles[feedback.kind] }}>
              {feedback.kind === "present" && <Check size={20} />}
              {feedback.kind === "late" && <Clock size={20} />}
              {feedback.kind === "error" && <AlertCircle size={20} />}
              {feedback.kind === "info" && <AlertCircle size={20} />}
              <div>
                <div style={{ fontWeight: 700, fontSize: 16 }}>{feedback.text}</div>
                <div style={{ fontSize: 12.5, opacity: 0.85 }}>{feedback.sub}</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DashboardView({ classes, dashClassId, setDashClassId, dashDate, setDashDate, dashClass, presentList, lateList, absentList, dashRecords, cycleStatus }) {
  if (classes.length === 0) {
    return (
      <div style={styles.emptyState}>
        <div style={styles.emptyStamp}>NO CLASSES YET</div>
        <p style={styles.emptyText}>Add a class in Manage to see reports here.</p>
      </div>
    );
  }
  const allStudents = [...presentList, ...lateList, ...absentList];
  return (
    <>
      <div style={styles.toolbar}>
        <select value={dashClassId || ""} onChange={(e) => setDashClassId(e.target.value)} style={styles.classSelect}>
          {classes.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <div style={styles.dateWrap}>
          <input type="date" value={dashDate} onChange={(e) => setDashDate(e.target.value)} style={styles.dateInput} />
          <span style={styles.dateNice}>{formatDateNice(dashDate)}</span>
        </div>
      </div>

      <div className="rr-summary-row" style={styles.summaryRow}>
        <SummaryStat label="Total" value={allStudents.length} color="#2F4538" />
        <SummaryStat label="Present" value={presentList.length} color="#3C6E47" />
        <SummaryStat label="Late" value={lateList.length} color="#B8860B" />
        <SummaryStat label="Absent" value={absentList.length} color="#B23A2E" />
      </div>

      <div className="rr-card-in" style={styles.ledgerCard}>
        <div className="rr-ledger-row rr-ledger-header" style={styles.ledgerHeaderRow}>
          <span className="rr-col-roll" style={styles.colHeader}>Roll</span>
          <span className="rr-ledger-name" style={styles.colHeader}>Name</span>
          <span className="rr-col-time" style={styles.colHeader}>Time</span>
          <span className="rr-col-status" style={{ ...styles.colHeader, justifyContent: "center" }}>Status</span>
        </div>
        {allStudents.length === 0 && <div style={styles.emptyText}>No students in this class yet.</div>}
        {[...presentList, ...lateList, ...absentList]
          .sort((a, b) => (a.roll || "").localeCompare(b.roll || "", undefined, { numeric: true }))
          .map((s) => {
            const rec = dashRecords[s.id];
            const status = rec ? rec.status : "absent";
            return (
              <div key={s.id} className="rr-row rr-ledger-row" style={styles.studentRow}>
                <span className="rr-col-roll" style={{ fontFamily: "'Courier Prime', monospace", color: "#8a8371" }}>{s.roll || "—"}</span>
                <span className="rr-ledger-name" style={{ fontWeight: 600, color: "#2A2520" }}>{s.name}</span>
                <span className="rr-col-time" style={{ fontFamily: "'Courier Prime', monospace", fontSize: 12, color: "#8a8371" }}>{rec?.time || "—"}</span>
                <span className="rr-col-status">
                  <button className="rr-btn rr-pill" onClick={() => cycleStatus(s.id)} style={{ ...styles.statusPill, ...pillStyles[status] }}>
                    {status}
                  </button>
                </span>
              </div>
            );
          })}
      </div>
      <p style={styles.hintText}>Tap a status pill to correct it manually (cycles present → late → absent).</p>
    </>
  );
}

function ManageView(props) {
  const {
    classes, newClassName, setNewClassName, addClass,
    manageClassId, setManageClassId, manageClass, manageStudents,
    newStudentName, setNewStudentName, newStudentRoll, setNewStudentRoll, addStudent,
    confirmDeleteStudent, setConfirmDeleteStudent, deleteStudent,
    confirmDeleteClass, setConfirmDeleteClass, deleteClass,
    lateAfter, updateLateAfter,
  } = props;

  return (
    <>
      <div className="rr-card-in" style={styles.settingsCard}>
        <div style={styles.settingsLabel}>Late cutoff</div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <input type="time" value={lateAfter} onChange={(e) => updateLateAfter(e.target.value)} style={styles.dateInput} />
          <span style={styles.hintTextInline}>Check-ins at or before this time are present; after, late.</span>
        </div>
      </div>

      <div className="rr-manage-grid">
        <div className="rr-card-in" style={styles.manageCol}>
          <div style={styles.sectionTitle}>Classes</div>
          <div style={styles.addClassPanel}>
            <input
              value={newClassName}
              onChange={(e) => setNewClassName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addClass()}
              placeholder="e.g. Grade 6 — Section B"
              style={{ ...styles.input, flex: 1 }}
            />
            <button className="rr-btn" onClick={addClass} style={styles.primaryBtnSmall}><Plus size={14} /> Add</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 12 }}>
            {classes.map((c) => (
              <div
                key={c.id}
                onClick={() => setManageClassId(c.id)}
                className="rr-row"
                style={{ ...styles.classListItem, ...(c.id === manageClassId ? styles.classListItemActive : {}) }}
              >
                <span>{c.name}</span>
                {confirmDeleteClass === c.id ? (
                  <span style={{ display: "flex", gap: 4 }}>
                    <button className="rr-btn" onClick={(e) => { e.stopPropagation(); deleteClass(c.id); }} style={styles.confirmYes}>Delete</button>
                    <button className="rr-btn" onClick={(e) => { e.stopPropagation(); setConfirmDeleteClass(null); }} style={styles.confirmNo}>Cancel</button>
                  </span>
                ) : (
                  <button className="rr-btn" onClick={(e) => { e.stopPropagation(); setConfirmDeleteClass(c.id); }} style={styles.iconBtn}>
                    <Trash2 size={14} color="#B23A2E" />
                  </button>
                )}
              </div>
            ))}
            {classes.length === 0 && <div style={styles.emptyText}>No classes yet.</div>}
          </div>
        </div>

        <div className="rr-card-in" style={styles.manageCol}>
          <div style={styles.sectionTitle}>{manageClass ? `Students — ${manageClass.name}` : "Students"}</div>
          {!manageClass ? (
            <div style={styles.emptyText}>Select a class to manage its students.</div>
          ) : (
            <>
              <div style={styles.addStudentRow}>
                <input value={newStudentRoll} onChange={(e) => setNewStudentRoll(e.target.value)} placeholder="Roll #" style={{ ...styles.input, width: 80 }} />
                <input
                  value={newStudentName}
                  onChange={(e) => setNewStudentName(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && addStudent()}
                  placeholder="Student name"
                  style={{ ...styles.input, flex: 1 }}
                />
                <button className="rr-btn" onClick={addStudent} style={styles.primaryBtnSmall}><Plus size={14} /> Add</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", marginTop: 10 }}>
                {manageStudents.map((s) => (
                  <div key={s.id} className="rr-row rr-ledger-row" style={styles.studentRow}>
                    <span className="rr-col-roll" style={{ fontFamily: "'Courier Prime', monospace", color: "#8a8371" }}>{s.roll}</span>
                    <span className="rr-ledger-name" style={{ fontWeight: 600 }}>{s.name}</span>
                    {confirmDeleteStudent === s.id ? (
                      <span style={{ display: "flex", gap: 4 }}>
                        <button className="rr-btn" onClick={() => deleteStudent(s.id)} style={styles.confirmYes}>Yes</button>
                        <button className="rr-btn" onClick={() => setConfirmDeleteStudent(null)} style={styles.confirmNo}>No</button>
                      </span>
                    ) : (
                      <button className="rr-btn" onClick={() => setConfirmDeleteStudent(s.id)} style={styles.iconBtn}>
                        <Trash2 size={14} color="#B23A2E" />
                      </button>
                    )}
                  </div>
                ))}
                {manageStudents.length === 0 && <div style={styles.emptyText}>No students yet — add one above.</div>}
              </div>
            </>
          )}
        </div>
      </div>
    </>
  );
}

function SummaryStat({ label, value, color }) {

      <div style={{ ...styles.statValue, color }}>{value}</div>
      <div style={styles.statLabel}>{label}</div>
    </div>
  );
}
